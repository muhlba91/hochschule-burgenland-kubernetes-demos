---
# see: https://github.com/bitnami/charts/blob/main/bitnami/wordpress/values.yaml
wordpressPassword: password

service:
  type: LoadBalancer

wordpressExtraEnvVars:
  - name: WORDPRESS_EXTRA_WP_CONFIG_CONTENT
    value: "define('WP_HOME','http://wordpress.andreas.mcce.werschlan.at'); define('WP_SITEURL','http://wordpress.andreas.mcce.werschlan.at');"

persistence:
  storageClass: standard
  size: 500Mi
volumePermissions:
  enabled: true

resources:
  limits:
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

mariadb:
  primary:
    persistence:
      storageClass: standard
      size: 500Mi
    resources:
      limits:
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 64Mi
