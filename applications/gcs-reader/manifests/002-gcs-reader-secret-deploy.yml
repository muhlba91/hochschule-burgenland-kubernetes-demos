---
# kubectl create secret generic gcs-reader-key --from-file=key.json=./gcp-sa-key.json

apiVersion: apps/v1
kind: Deployment
metadata:
  name: gcs-reader-secret
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gcs-reader-secret
  template:
    metadata:
      labels:
        app: gcs-reader-secret
    spec:
      containers:
        - name: gcs-reader
          image: google/cloud-sdk:slim
          command:
            - sleep
            - infinity
          env:
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/secrets/google/key.json
            - name: GOOGLE_CREDENTIALS
              value: /var/secrets/google/key.json
            # TODO: replace with your GCP project ID
            - name: CLOUDSDK_CORE_PROJECT
              value: your-gcp-project-id
          volumeMounts:
            - name: google-cloud-key
              mountPath: /var/secrets/google
              readOnly: true
          resources:
            limits:
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
      volumes:
        - name: google-cloud-key
          secret:
            secretName: gcs-reader-key
            items:
              - key: key.json
                path: key.json
